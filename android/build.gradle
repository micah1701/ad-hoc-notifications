buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 26
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.5.0")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Library subprojects (e.g. async-storage) set compileOptions.sourceCompatibility = 1.8.
// KGP 2.1+ reads sourceCompatibility to pick a default jvmTarget. If any configureEach
// temporarily set sourceCompatibility = 21 before AGP resets it to 1.8, KGP latches onto
// 21 while Java ends up at 1.8 — producing the "Inconsistent JVM-target" error.
// Fix: explicitly pin Kotlin jvmTarget to JVM_1_8 for all non-app modules via
// plugins.withId (fires right after the Kotlin plugin is applied, before any task
// realization). The :app module is excluded; its kotlin { jvmToolchain(21) } block
// handles the target directly.
subprojects {
    if (project.name != "app") {
        plugins.withId("org.jetbrains.kotlin.android") {
            kotlin {
                compilerOptions {
                    jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_1_8)
                }
            }
        }
    }
}
