buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 26
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.5.0")
    }
}

apply plugin: "com.facebook.react.rootproject"

// RN plugin's Java version alignment is disabled (see gradle.properties).
// This replaces it: configureEach is lazy and fires at task-execution time,
// so it avoids the "already evaluated" error that afterEvaluate hits when
// autolinkLibrariesWithApp() forces eager subproject evaluation.
subprojects {
    tasks.withType(JavaCompile).configureEach {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }
}
